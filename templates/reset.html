<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow — Nueva Contraseña</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3d; --accent: #00e5a0; --danger: #ff4d6d; --text: #e8e8f0; --muted: #6b6b8a; --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
  .box { position: relative; z-index: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 400px; max-width: 95vw; animation: fadeIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .logo { text-align: center; margin-bottom: 36px; }
  .logo h1 { font-family: var(--font-display); font-size: 32px; font-weight: 800; }
  .logo h1 span { color: var(--accent); }
  .logo p { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; }
  .form-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: var(--font-mono); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: var(--accent); }
  .btn { width: 100%; padding: 13px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: var(--font-display); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
  .btn:hover { background: #00ffb3; transform: translateY(-1px); }
  .error-msg { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: var(--danger); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 18px; display: none; }
  .error-msg.show { display: block; }
  .success-msg { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.3); color: var(--accent); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 18px; display: none; }
  .success-msg.show { display: block; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <h1>Stock<span>Flow</span></h1>
    <p>Nueva Contraseña</p>
  </div>
  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>
  <div class="form-group">
    <label>Nueva Contraseña</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <div class="form-group">
    <label>Confirmar Contraseña</label>
    <input type="password" id="password2" placeholder="••••••••">
  </div>
  <button class="btn" onclick="resetear()">Guardar nueva contraseña</button>
</div>

<script>
  const token = "{{ token }}";

  async function resetear() {
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const errMsg    = document.getElementById('error-msg');
    const succMsg   = document.getElementById('success-msg');
    errMsg.classList.remove('show');
    succMsg.classList.remove('show');

    if (!password || !password2) { errMsg.textContent = 'Completa todos los campos'; errMsg.classList.add('show'); return; }
    if (password !== password2)  { errMsg.textContent = 'Las contraseñas no coinciden'; errMsg.classList.add('show'); return; }
    if (password.length < 6)     { errMsg.textContent = 'Mínimo 6 caracteres'; errMsg.classList.add('show'); return; }

    try {
      const res = await fetch('/auth/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password }) });
      const data = await res.json();
      if (!res.ok) { errMsg.textContent = data.error; errMsg.classList.add('show'); return; }
      succMsg.textContent = '✓ Contraseña actualizada. Redirigiendo...';
      succMsg.classList.add('show');
      setTimeout(() => window.location.href = '/login', 2000);
    } catch(e) { errMsg.textContent = 'Error de conexión'; errMsg.classList.add('show'); }
  }
</script>
</body>
</html>
